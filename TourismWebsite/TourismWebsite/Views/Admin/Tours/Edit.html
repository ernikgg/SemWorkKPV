<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Edit Tour</title>
</head>
<body>
    <h1>Edit Tour #{{ Id }}</h1>

    {% if Error %}
    <p style="color:red">{{ Error }}</p>
    {% endif %}

    <form method="post" action="/admin/tours/edit/{{ Id }}">
        <div>
            <label>Title</label><br />
            <input name="Title" value="{{ Tour.Title }}" />
        </div>

        <div>
            <label>Price</label><br />
            <input name="PriceText" value="{{ Tour.PriceText }}" />
        </div>

        <div>
            <label>Duration</label><br />
            <input name="DurationText" value="{{ Tour.DurationText }}" />
        </div>

        <div>
            <label>Image URL</label><br />
            <input name="ImageUrl" value="{{ Tour.ImageUrl }}" />
        </div>

        <div>
            <label>
                <input type="checkbox" name="IsTop" />
                Is Top (поставь галочку если нужно)
            </label>
        </div>

        <button type="submit">Save</button>


    <script src="/js/app.js"></script>

    <p><a href="/admin/tours">← Back</a></p>
</body>
</html>
